<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Service WebSocket Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .section h3 {
            margin-top: 0;
            color: #667eea;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .connected {
            background: #d4edda;
            color: #155724;
        }
        .disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .log {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #4CAF50;
            background: white;
        }
        .log-entry.error {
            border-left-color: #f44336;
            background: #ffebee;
        }
        .log-entry.sent {
            border-left-color: #2196F3;
            background: #e3f2fd;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .timestamp {
            color: #666;
            font-size: 11px;
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🔌 Realtime Service WebSocket Test</h1>
        
        <div id="status" class="status disconnected">
            Status: Disconnected
        </div>

        <div class="controls">
            <button id="connectBtn" onclick="connect()">Connect</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
            <button onclick="clearLog()">Clear Log</button>
        </div>

        <div class="controls">
            <h3>Test Events:</h3>
            <button onclick="joinCourse()" disabled class="event-btn">Join Course Room</button>
            <button onclick="monitorSession()" disabled class="event-btn">Monitor Session</button>
            <button onclick="simulateAttendance()" disabled class="event-btn">Simulate Attendance</button>
            <button onclick="simulateSessionStart()" disabled class="event-btn">Simulate Session Start</button>
        </div>

        <div class="input-group">
            <input type="text" id="authToken" placeholder="Paste your auth token here (get from auth service signin)">
            <button onclick="saveToken()">Save Token</button>
        </div>

        <div class="input-group">
            <input type="text" id="courseId" placeholder="Course ID (from database)">
            <input type="text" id="sessionId" placeholder="Session ID (from database)">
        </div>

        <h3>📋 Event Log:</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        let socket = null;
        let authToken = localStorage.getItem('authToken') || '';
        
        // Load saved token on page load
        document.getElementById('authToken').value = authToken;

        function saveToken() {
            authToken = document.getElementById('authToken').value;
            localStorage.setItem('authToken', authToken);
            addLog('Token saved', 'sent');
        }

        function addLog(message, type = 'received') {
            const log = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            log.insertBefore(entry, log.firstChild);
        }

        function updateStatus(connected) {
            const status = document.getElementById('status');
            if (connected) {
                status.className = 'status connected';
                status.textContent = 'Status: Connected';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.querySelectorAll('.event-btn').forEach(btn => btn.disabled = false);
            } else {
                status.className = 'status disconnected';
                status.textContent = 'Status: Disconnected';
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                document.querySelectorAll('.event-btn').forEach(btn => btn.disabled = true);
            }
        }

        function connect() {
            if (!authToken) {
                addLog('Please enter and save an auth token first!', 'error');
                return;
            }

            addLog('Connecting to WebSocket server...', 'sent');
            
            socket = io('http://localhost:3003', {
                auth: {
                    token: authToken
                }
            });

            socket.on('connect', () => {
                addLog('Connected successfully! Socket ID: ' + socket.id);
                updateStatus(true);
            });

            socket.on('disconnect', (reason) => {
                addLog('Disconnected: ' + reason, 'error');
                updateStatus(false);
            });

            socket.on('connect_error', (error) => {
                addLog('Connection error: ' + error.message, 'error');
                updateStatus(false);
            });

            // Listen for course events
            socket.on('course:created', (data) => {
                addLog('Course Created Event: ' + JSON.stringify(data));
            });

            socket.on('course:joined', (data) => {
                addLog('Course Joined Event: ' + JSON.stringify(data));
            });

            socket.on('member:joined', (data) => {
                addLog('Member Joined Course: ' + JSON.stringify(data));
            });

            // Listen for session events
            socket.on('session:created', (data) => {
                addLog('Session Created: ' + JSON.stringify(data));
            });

            socket.on('session:started', (data) => {
                addLog('🔴 Session Started! Access Code: ' + data.accessCode);
            });

            socket.on('session:ended', (data) => {
                addLog('Session Ended: ' + JSON.stringify(data));
            });

            // Listen for attendance events
            socket.on('attendance:marked', (data) => {
                addLog('✅ Attendance Marked: ' + data.userName + ' - ' + data.status);
            });

            socket.on('attendance:updated', (data) => {
                addLog('Attendance Updated: ' + JSON.stringify(data));
            });
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                addLog('Disconnected manually', 'sent');
                updateStatus(false);
            }
        }

        function joinCourse() {
            const courseId = document.getElementById('courseId').value;
            if (!courseId) {
                addLog('Please enter a Course ID', 'error');
                return;
            }
            socket.emit('course:join', courseId);
            addLog(`Joined course room: ${courseId}`, 'sent');
        }

        function monitorSession() {
            const sessionId = document.getElementById('sessionId').value;
            if (!sessionId) {
                addLog('Please enter a Session ID', 'error');
                return;
            }
            socket.emit('session:monitor', sessionId);
            addLog(`Monitoring session: ${sessionId}`, 'sent');
        }

        function simulateAttendance() {
            const sessionId = document.getElementById('sessionId').value;
            if (!sessionId) {
                addLog('Please enter a Session ID', 'error');
                return;
            }
            socket.emit('attendance:marked', {
                sessionId: sessionId,
                userId: 'test-user-id',
                userName: 'Test Student',
                status: 'PRESENT',
                markedAt: new Date()
            });
            addLog('Simulated attendance mark', 'sent');
        }

        function simulateSessionStart() {
            const courseId = document.getElementById('courseId').value;
            const sessionId = document.getElementById('sessionId').value;
            if (!courseId || !sessionId) {
                addLog('Please enter both Course ID and Session ID', 'error');
                return;
            }
            socket.emit('session:started', {
                sessionId: sessionId,
                courseId: courseId,
                sessionName: 'Test Session',
                accessCode: 'TEST01',
                memberIds: []
            });
            addLog('Simulated session start', 'sent');
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            addLog('Log cleared');
        }
    </script>
</body>
</html>
