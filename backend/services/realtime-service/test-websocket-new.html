<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Service WebSocket Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .section h3 {
            margin-top: 0;
            color: #667eea;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            font-size: 16px;
        }
        .connected {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }
        .disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }
        .log {
            background: #2d2d2d;
            color: #f0f0f0;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .log-entry.received {
            background: rgba(40, 167, 69, 0.2);
            border-left: 4px solid #28a745;
        }
        .log-entry.sent {
            background: rgba(0, 123, 255, 0.2);
            border-left: 4px solid #007bff;
        }
        .log-entry.error {
            background: rgba(220, 53, 69, 0.2);
            border-left: 4px solid #dc3545;
        }
        .log-entry.warning {
            background: rgba(255, 193, 7, 0.2);
            border-left: 4px solid #ffc107;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input, textarea {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .timestamp {
            color: #888;
            font-size: 11px;
            margin-right: 8px;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }
        .badge.gps {
            background: #28a745;
            color: white;
        }
        .info-box {
            background: #e8f4fd;
            border: 1px solid #bee5eb;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .info-box strong {
            color: #004085;
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🔌 Realtime Service WebSocket Test Panel</h1>
        
        <div id="status" class="status disconnected">
            ⚪ Status: Disconnected
        </div>

        <div class="info-box">
            <strong>ℹ️ GPS Verification Only:</strong> No access codes needed! Students must be within GPS radius to mark attendance.
        </div>

        <div class="grid">
            <div class="section">
                <h3>🔐 Authentication</h3>
                <div class="input-group">
                    <input type="text" id="authToken" placeholder="Paste JWT token from auth service">
                    <button onclick="saveToken()">Save</button>
                </div>
                <div class="controls">
                    <button id="connectBtn" onclick="connect()">Connect</button>
                    <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
                </div>
            </div>

            <div class="section">
                <h3>📚 Test Data</h3>
                <div class="input-group">
                    <input type="text" id="courseId" placeholder="Course ID">
                    <button onclick="saveCourseId()">Save</button>
                </div>
                <div class="input-group">
                    <input type="text" id="sessionId" placeholder="Session ID">
                    <button onclick="saveSessionId()">Save</button>
                </div>
                <div class="input-group">
                    <input type="text" id="userId" placeholder="User ID (for simulations)">
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="section">
                <h3>📡 Room Management</h3>
                <div class="controls">
                    <button onclick="joinCourseRoom()" disabled class="event-btn">Join Course Room</button>
                    <button onclick="leaveCourseRoom()" disabled class="event-btn">Leave Course Room</button>
                    <button onclick="monitorSession()" disabled class="event-btn">Monitor Session</button>
                </div>
            </div>

            <div class="section">
                <h3>🎯 Event Simulation</h3>
                <div class="controls">
                    <button onclick="simulateSessionStart()" disabled class="event-btn">Session Start</button>
                    <button onclick="simulateAttendance()" disabled class="event-btn">Attendance Mark</button>
                    <button onclick="simulateSessionEnd()" disabled class="event-btn">Session End</button>
                    <button onclick="clearLog()">Clear Log</button>
                </div>
            </div>
        </div>

        <div class="section" style="margin-top: 20px;">
            <h3>📝 Custom Event Test</h3>
            <div class="input-group">
                <input type="text" id="eventName" placeholder="Event name (e.g., session:started)">
                <textarea id="eventData" placeholder='Event data JSON (e.g., {"sessionId":"123"})' rows="2"></textarea>
                <button onclick="sendCustomEvent()" disabled class="event-btn">Send</button>
            </div>
        </div>

        <h3>📋 Event Log:</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        let socket = null;
        let authToken = localStorage.getItem('authToken') || '';
        let courseId = localStorage.getItem('courseId') || '';
        let sessionId = localStorage.getItem('sessionId') || '';
        
        // Load saved values
        document.getElementById('authToken').value = authToken;
        document.getElementById('courseId').value = courseId;
        document.getElementById('sessionId').value = sessionId;

        function saveToken() {
            authToken = document.getElementById('authToken').value;
            localStorage.setItem('authToken', authToken);
            addLog('Token saved to localStorage', 'sent');
        }

        function saveCourseId() {
            courseId = document.getElementById('courseId').value;
            localStorage.setItem('courseId', courseId);
            addLog(`Course ID saved: ${courseId}`, 'sent');
        }

        function saveSessionId() {
            sessionId = document.getElementById('sessionId').value;
            localStorage.setItem('sessionId', sessionId);
            addLog(`Session ID saved: ${sessionId}`, 'sent');
        }

        function addLog(message, type = 'received') {
            const log = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            let icon = '📥';
            if (type === 'sent') icon = '📤';
            if (type === 'error') icon = '❌';
            if (type === 'warning') icon = '⚠️';
            
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${icon} ${message}`;
            log.insertBefore(entry, log.firstChild);
            
            // Keep only last 100 entries
            while (log.children.length > 100) {
                log.removeChild(log.lastChild);
            }
        }

        function updateStatus(connected) {
            const status = document.getElementById('status');
            if (connected) {
                status.className = 'status connected';
                status.innerHTML = '🟢 Status: Connected';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.querySelectorAll('.event-btn').forEach(btn => btn.disabled = false);
            } else {
                status.className = 'status disconnected';
                status.innerHTML = '🔴 Status: Disconnected';
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                document.querySelectorAll('.event-btn').forEach(btn => btn.disabled = true);
            }
        }

        function connect() {
            if (!authToken) {
                addLog('Please enter and save an auth token first!', 'error');
                return;
            }

            addLog('Connecting to WebSocket server at localhost:3003...', 'sent');
            
            // Important: The attendance service connects as a service, not with auth
            // For testing as a client, we need to provide auth token
            socket = io('http://localhost:3003', {
                auth: {
                    token: authToken
                },
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000,
            });

            // Connection events
            socket.on('connect', () => {
                addLog(`Connected successfully! Socket ID: ${socket.id}`, 'received');
                updateStatus(true);
                
                // Auto-join user's personal room (done server-side)
                addLog(`Automatically joined personal room: user:YOUR_USER_ID`, 'received');
            });

            socket.on('disconnect', (reason) => {
                addLog(`Disconnected: ${reason}`, 'error');
                updateStatus(false);
            });

            socket.on('connect_error', (error) => {
                addLog(`Connection error: ${error.message}`, 'error');
                updateStatus(false);
            });

            // Course events
            socket.on('course:created', (data) => {
                addLog(`📚 Course Created: ${JSON.stringify(data)}`, 'received');
            });

            socket.on('course:joined', (data) => {
                addLog(`📚 Course Joined: User ${data.userId} joined course ${data.courseId}`, 'received');
            });

            socket.on('member:joined', (data) => {
                addLog(`👤 New Member Joined Course: ${JSON.stringify(data)}`, 'received');
            });

            socket.on('member:left', (data) => {
                addLog(`👤 Member Left Course: ${JSON.stringify(data)}`, 'received');
            });

            // Session events
            socket.on('session:created', (data) => {
                addLog(`📅 Session Created: ${data.sessionName} for ${data.courseName} at ${data.startTime}`, 'received');
            });

            socket.on('session:started', (data) => {
                addLog(`🔴 SESSION STARTED! ${data.sessionName} <span class="badge gps">GPS Verification Required</span>`, 'warning');
                addLog(`Session ID: ${data.sessionId} - NO ACCESS CODE NEEDED`, 'received');
            });

            socket.on('session:active', (data) => {
                addLog(`📍 Session Active: ${JSON.stringify(data)}`, 'received');
            });

            socket.on('session:ended', (data) => {
                addLog(`🏁 Session Ended: ${JSON.stringify(data)}`, 'received');
            });

            // Attendance events
            socket.on('attendance:marked', (data) => {
                addLog(`✅ ATTENDANCE MARKED: ${data.userName} - Status: ${data.status} - Distance: ${data.distance}m`, 'warning');
                addLog(`Marked at: ${data.markedAt}`, 'received');
            });

            socket.on('attendance:update', (data) => {
                addLog(`📝 Attendance Update: ${data.userName} marked ${data.status} at distance ${data.distance}m`, 'received');
            });

            socket.on('attendance:status-updated', (data) => {
                addLog(`🔄 Your Attendance Status Updated: ${data.status}`, 'warning');
            });

            // Generic event listener for debugging
            socket.onAny((eventName, ...args) => {
                if (!eventName.startsWith('connect')) {
                    console.log('Event received:', eventName, args);
                }
            });
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                addLog('Disconnected manually', 'sent');
                updateStatus(false);
                socket = null;
            }
        }

        function joinCourseRoom() {
            const courseId = document.getElementById('courseId').value;
            if (!courseId) {
                addLog('Please enter a Course ID', 'error');
                return;
            }
            if (!socket) {
                addLog('Not connected to WebSocket', 'error');
                return;
            }
            socket.emit('course:join', courseId);
            addLog(`Joining course room: ${courseId}`, 'sent');
        }

        function leaveCourseRoom() {
            const courseId = document.getElementById('courseId').value;
            if (!courseId) {
                addLog('Please enter a Course ID', 'error');
                return;
            }
            if (!socket) {
                addLog('Not connected to WebSocket', 'error');
                return;
            }
            socket.emit('course:leave', courseId);
            addLog(`Leaving course room: ${courseId}`, 'sent');
        }

        function monitorSession() {
            const sessionId = document.getElementById('sessionId').value;
            if (!sessionId) {
                addLog('Please enter a Session ID', 'error');
                return;
            }
            if (!socket) {
                addLog('Not connected to WebSocket', 'error');
                return;
            }
            socket.emit('session:monitor', sessionId);
            addLog(`Monitoring session: ${sessionId}`, 'sent');
        }

        function simulateSessionStart() {
            const courseId = document.getElementById('courseId').value;
            const sessionId = document.getElementById('sessionId').value;
            if (!courseId || !sessionId) {
                addLog('Please enter both Course ID and Session ID', 'error');
                return;
            }
            if (!socket) {
                addLog('Not connected to WebSocket', 'error');
                return;
            }
            
            const data = {
                sessionId: sessionId,
                courseId: courseId,
                sessionName: 'Test Session (WebSocket Test)',
                memberIds: [document.getElementById('userId').value || 'test-user']
            };
            
            socket.emit('session:started', data);
            addLog(`Simulated session start (GPS verification only): ${JSON.stringify(data)}`, 'sent');
        }

        function simulateAttendance() {
            const sessionId = document.getElementById('sessionId').value;
            const userId = document.getElementById('userId').value || 'test-user-id';
            
            if (!sessionId) {
                addLog('Please enter a Session ID', 'error');
                return;
            }
            if (!socket) {
                addLog('Not connected to WebSocket', 'error');
                return;
            }
            
            const data = {
                sessionId: sessionId,
                userId: userId,
                userName: 'Test Student',
                status: 'PRESENT',
                markedAt: new Date().toISOString(),
                distance: Math.floor(Math.random() * 50) + 10  // Random distance 10-60m
            };
            
            socket.emit('attendance:marked', data);
            addLog(`Simulated GPS attendance mark: ${JSON.stringify(data)}`, 'sent');
        }

        function simulateSessionEnd() {
            const courseId = document.getElementById('courseId').value;
            const sessionId = document.getElementById('sessionId').value;
            
            if (!courseId || !sessionId) {
                addLog('Please enter both Course ID and Session ID', 'error');
                return;
            }
            if (!socket) {
                addLog('Not connected to WebSocket', 'error');
                return;
            }
            
            const data = {
                sessionId: sessionId,
                courseId: courseId,
                stats: {
                    _count: 25,
                    0: { status: 'PRESENT', _count: 20 },
                    1: { status: 'LATE', _count: 3 },
                    2: { status: 'ABSENT', _count: 2 }
                }
            };
            
            socket.emit('session:ended', data);
            addLog(`Simulated session end: ${JSON.stringify(data)}`, 'sent');
        }

        function sendCustomEvent() {
            const eventName = document.getElementById('eventName').value;
            const eventDataStr = document.getElementById('eventData').value;
            
            if (!eventName) {
                addLog('Please enter an event name', 'error');
                return;
            }
            if (!socket) {
                addLog('Not connected to WebSocket', 'error');
                return;
            }
            
            try {
                const eventData = eventDataStr ? JSON.parse(eventDataStr) : {};
                socket.emit(eventName, eventData);
                addLog(`Custom event sent: ${eventName} = ${JSON.stringify(eventData)}`, 'sent');
            } catch (e) {
                addLog(`Invalid JSON in event data: ${e.message}`, 'error');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            addLog('Log cleared', 'warning');
        }

        // Auto-reconnect on page visibility change
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && socket && !socket.connected) {
                addLog('Page became visible, attempting reconnection...', 'warning');
                socket.connect();
            }
        });
    </script>
</body>
</html>
