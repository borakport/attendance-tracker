services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - attendance_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - attendance_network

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_DISABLE: true
    networks:
      - attendance_network

  sms-simulator:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../sms-simulator:/app
    command: sh -c "npm install && npm start"
    ports:
      - "3010:3010"   # SMS simulator API and Web UI
    networks:
      - attendance_network

networks:
  attendance_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
